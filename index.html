<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Sederhana</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #eef0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background 0.4s;
    }

    body.dark { background: #1a1a2e; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 18px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #222;
      letter-spacing: 0.5px;
    }
    body.dark .header h1 { color: #f0f0f0; }
    .header p {
      font-size: 0.95rem;
      font-weight: 700;
      color: #333;
      line-height: 1.7;
    }
    body.dark .header p { color: #ccc; }

    /* Calculator Card */
    .calc-card {
      background: #fff;
      border-radius: 28px;
      width: 340px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.13);
    }
    body.dark .calc-card { background: #16213e; }

    /* Display */
    .display {
      background: linear-gradient(135deg, #f7a440 0%, #f76c8a 100%);
      padding: 18px 20px 22px;
      min-height: 170px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .display-label {
      position: absolute;
      top: 18px;
      left: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.5px;
    }

    /* Dark mode toggle — top right of display */
    .theme-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.35); }
    .theme-btn:active { transform: scale(0.92); }

    .display-expr {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      text-align: right;
      line-height: 1.1;
      word-break: break-all;
      min-height: 3.5rem;
    }
    .display-result {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      text-align: right;
      margin-top: 4px;
      min-height: 1.4rem;
    }

    .display.shake { animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Button area */
    .btn-area {
      background: #f0f0f5;
      padding: 16px 14px 14px;
    }
    body.dark .btn-area { background: #0f3460; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn {
      height: 68px;
      border-radius: 18px;
      border: none;
      font-size: 1.3rem;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s, filter 0.1s;
      -webkit-tap-highlight-color: transparent;
      background: #fff;
      color: #222;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    body.dark .btn { background: #1a1a2e; color: #f0f0f0; box-shadow: 0 3px 10px rgba(0,0,0,0.3); }

    .btn:hover { filter: brightness(0.96); }
    .btn:active { transform: scale(0.91); box-shadow: none; }

    .btn.ac {
      background: #fff;
      color: #e74c3c;
      font-size: 1.1rem;
      font-weight: 800;
    }
    body.dark .btn.ac { background: #1a1a2e; color: #ff6b6b; }

    .btn.op {
      background: #fff;
      color: #555;
    }
    body.dark .btn.op { background: #1a1a2e; color: #aaa; }

    /* = button: gradient like display */
    .btn.eq {
      background: linear-gradient(135deg, #f7a440 0%, #f76c8a 100%);
      color: #fff;
      font-size: 1.5rem;
      box-shadow: 0 4px 18px rgba(247,108,138,0.4);
    }
    .btn.eq:hover { filter: brightness(1.06); }

    /* Validation message */
    .validation {
      text-align: center;
      font-size: 0.78rem;
      color: #888;
      margin-top: 12px;
      min-height: 1.1rem;
      transition: color 0.3s;
    }
    .validation.error { color: #e74c3c; font-weight: 700; }

    @media (max-width: 380px) {
      .calc-card { width: 300px; }
      .btn { height: 58px; font-size: 1.1rem; }
      .display-expr { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Kalkulator Sederhana</h1>
    <p>Nama : Ripan Ripaldi</p>
    <p>NIM &nbsp;: 231011450179</p>
  </div>

  <!-- Calculator Card -->
  <div class="calc-card">

    <!-- Display -->
    <div class="display" id="display">
      <span class="display-label">Kalkulator</span>

      <!-- Dark mode toggle top right -->
      <button class="theme-btn" id="themeBtn" title="Ganti tema">🌙</button>

      <div class="display-expr" id="expr">0</div>
      <div class="display-result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="btn-area">
      <div class="btn-grid">

        <!-- Row 1 -->
        <button class="btn ac" data-action="clear">AC</button>
        <button class="btn op" data-action="bracket-open">(</button>
        <button class="btn op" data-action="bracket-close">)</button>
        <button class="btn op" data-op="÷">÷</button>

        <!-- Row 2 -->
        <button class="btn" data-num="7">7</button>
        <button class="btn" data-num="8">8</button>
        <button class="btn" data-num="9">9</button>
        <button class="btn op" data-op="×">×</button>

        <!-- Row 3 -->
        <button class="btn" data-num="4">4</button>
        <button class="btn" data-num="5">5</button>
        <button class="btn" data-num="6">6</button>
        <button class="btn op" data-op="−">−</button>

        <!-- Row 4 -->
        <button class="btn" data-num="1">1</button>
        <button class="btn" data-num="2">2</button>
        <button class="btn" data-num="3">3</button>
        <button class="btn op" data-op="+">+</button>

        <!-- Row 5 -->
        <button class="btn op" data-action="sign">+/−</button>
        <button class="btn" data-num="0">0</button>
        <button class="btn" data-num=".">.</button>
        <button class="btn eq" data-action="equals">=</button>

      </div>

      <div class="validation" id="validation">Validasi: hanya angka dan tidak boleh kosong.</div>
    </div>

  </div>

  <script>
    let cur = '', op = null, first = null, justCalc = false;

    const exprEl  = document.getElementById('expr');
    const resEl   = document.getElementById('result');
    const valEl   = document.getElementById('validation');
    const dispEl  = document.getElementById('display');
    const themeBtn= document.getElementById('themeBtn');

    function fmt(n) {
      if (n === null || n === '') return '';
      return parseFloat(parseFloat(n).toPrecision(10)).toString();
    }

    function buildExpr() {
      if (first !== null && op) return fmt(first) + ' ' + op + ' ' + (cur || '');
      return cur || '0';
    }

    function updateUI(sub) {
      exprEl.textContent = buildExpr();
      resEl.textContent  = sub !== undefined ? sub : (cur || '0');
    }

    function showErr(msg) {
      valEl.textContent = '⚠️ ' + msg;
      valEl.classList.add('error');
      dispEl.classList.add('shake');
      setTimeout(() => {
        valEl.textContent = 'Validasi: hanya angka dan tidak boleh kosong.';
        valEl.classList.remove('error');
        dispEl.classList.remove('shake');
      }, 2000);
    }

    function calc(a, b, o) {
      if (o === '+') return a + b;
      if (o === '−') return a - b;
      if (o === '×') return a * b;
      if (o === '÷') {
        if (b === 0) { showErr('Tidak bisa dibagi nol!'); return null; }
        return a / b;
      }
      return null;
    }

    function inputNum(d) {
      if (d === '.' && cur.includes('.')) return;
      if (justCalc) {
        cur = d === '.' ? '0.' : d;
        first = null; op = null; justCalc = false;
      } else {
        if (cur === '0' && d !== '.') cur = d;
        else { if (cur.length >= 12) return; cur += d; }
      }
      let sub = cur;
      if (first !== null && op && cur !== '') {
        let p = calc(first, parseFloat(cur), op);
        if (p !== null) sub = fmt(p);
      }
      updateUI(sub);
    }

    function chooseOp(o) {
      if (cur === '' && first === null) { showErr('Masukkan angka terlebih dahulu!'); return; }
      if (cur !== '' && first !== null && op) {
        let r = calc(first, parseFloat(cur), op);
        if (r === null) return;
        first = r; cur = '';
      } else if (cur !== '') { first = parseFloat(cur); cur = ''; }
      op = o;
      updateUI('');
    }

    function doEquals() {
      if (first === null) { showErr('Masukkan operasi lengkap!'); return; }
      if (cur === '')     { showErr('Masukkan angka kedua!'); return; }
      if (op === null)    { showErr('Pilih operator terlebih dahulu!'); return; }
      let b    = parseFloat(cur);
      let expr = fmt(first) + op + fmt(b);
      let r    = calc(first, b, op);
      if (r === null) return;
      exprEl.textContent = fmt(r);
      resEl.textContent  = expr;
      first = r; cur = ''; op = null; justCalc = true;
    }

    function clearAll() {
      cur = ''; op = null; first = null; justCalc = false;
      exprEl.textContent = '0';
      resEl.textContent  = '0';
    }

    function toggleSign() {
      if (!cur || cur === '0') return;
      cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
      updateUI(cur);
    }

    document.querySelector('.btn-grid').addEventListener('click', e => {
      const b = e.target.closest('.btn');
      if (!b) return;
      if (b.dataset.num !== undefined)              inputNum(b.dataset.num);
      else if (b.dataset.op)                        chooseOp(b.dataset.op);
      else if (b.dataset.action === 'clear')        clearAll();
      else if (b.dataset.action === 'equals')       doEquals();
      else if (b.dataset.action === 'sign')         toggleSign();
      else if (b.dataset.action === 'bracket-open') inputNum('(');
      else if (b.dataset.action === 'bracket-close')inputNum(')');
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.')     inputNum('.');
      else if (e.key === '+')     chooseOp('+');
      else if (e.key === '-')     chooseOp('−');
      else if (e.key === '*')     chooseOp('×');
      else if (e.key === '/') { e.preventDefault(); chooseOp('÷'); }
      else if (e.key === 'Enter' || e.key === '=') doEquals();
      else if (e.key === 'Backspace') {
        if (justCalc) { clearAll(); return; }
        if (cur.length > 0) { cur = cur.slice(0, -1); updateUI(cur || '0'); }
      }
      else if (e.key === 'Escape') clearAll();
    });

    // Theme toggle
    let isDark = false;
    themeBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
